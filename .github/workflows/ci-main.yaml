name: CI Pipeline - Lint, Test, and Build Docker Image

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install ruff
      - run: ruff check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          LLM_MODEL: llama-3.1-8b-instant
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          VECTOR_COLLECTION: portfolio
          EMBEDDING_MODEL: BAAI/bge-small-en-v1.5
          EMBEDDING_PROVIDER: huggingface
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          DATA_DIR: data
          PYTHONPATH: ${{ github.workspace }}
        run: pytest tests/ -v -s

  docker:
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/portfolio-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/portfolio-backend:${{ github.sha }}

      - name: Docker build summary
        run: |
          echo "### Docker Build Summary :whale:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Image ID:** ${{ steps.build.outputs.imageid }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Digest:** ${{ steps.build.outputs.digest }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tags:**" >> $GITHUB_STEP_SUMMARY
          echo "  - \`${{ secrets.DOCKERHUB_USERNAME }}/portfolio-backend:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "  - \`${{ secrets.DOCKERHUB_USERNAME }}/portfolio-backend:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
